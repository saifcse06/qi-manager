{% extends 'base.html' %}
{% block title %}Profile - QI Manager{% endblock %}
{% block content %}
<div class="container">
    <h1 class="mb-4">Profile</h1>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">{{ user.get_full_name|default:user.email }}</h5>
            <p class="text-muted">{{ user.email }}</p>
        </div>
    </div>
</div>
{% endblock %}
